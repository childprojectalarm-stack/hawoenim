app = "hawoenim"
primary_region = "nrt"

[build]

[env]
  NODE_ENV = "production"
  PORT = "3000"
  DB_PATH = "/data/hawoenim.db"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "hawoenim_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
