<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#6366F1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="하원알림">
<title>하원알림</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--p:#6366F1;--g:#10B981;--gp:#ECFDF5;--r:#EF4444;--rp:#FEF2F2;--a:#F59E0B;--ap:#FFFBEB;--b:#3B82F6;--bp:#EFF6FF;--bg:#F8F9FF;--c:#fff;--t:#0F172A;--sub:#64748B;--hint:#CBD5E1;--bdr:#E2E8F0;--ra:18px;--rs:12px;--sh:0 4px 24px rgba(99,102,241,.1);}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);min-height:100vh;max-width:430px;margin:0 auto;}
/* 로딩 - 기본 숨김 */
#ld{position:fixed;inset:0;background:rgba(255,255,255,.95);z-index:9999;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.ldr{width:44px;height:44px;border:4px solid var(--bdr);border-top-color:var(--p);border-radius:50%;animation:sp .8s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
/* 토스트 */
#ts{position:fixed;bottom:calc(88px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%) translateY(20px);background:#0F172A;color:#fff;border-radius:24px;padding:12px 24px;font-size:13px;font-weight:600;z-index:9998;opacity:0;transition:all .3s;white-space:nowrap;max-width:85vw;text-align:center;pointer-events:none;}
#ts.show{opacity:1;transform:translateX(-50%) translateY(0);}
/* 로그인 */
#ls{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 24px;background:linear-gradient(145deg,#6366F1,#8B5CF6,#EC4899);}
.lc{background:#fff;border-radius:28px;padding:36px 28px;width:100%;max-width:360px;box-shadow:0 24px 64px rgba(0,0,0,.2);}
.lb{display:flex;flex-direction:column;align-items:center;margin-bottom:32px;gap:10px;}
.lg{width:72px;height:72px;background:linear-gradient(135deg,#6366F1,#8B5CF6);border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:36px;box-shadow:0 8px 28px rgba(99,102,241,.35);}
.lt{font-size:24px;font-weight:900;color:var(--t);}
.ls2{font-size:13px;color:var(--sub);}
.fg{margin-bottom:16px;}
.fl{font-size:12px;font-weight:700;color:var(--sub);display:block;margin-bottom:8px;letter-spacing:.5px;text-transform:uppercase;}
.fi{width:100%;height:52px;border:2px solid var(--bdr);border-radius:var(--rs);padding:0 16px;font-size:16px;font-family:inherit;outline:none;transition:all .2s;background:#FAFAFA;color:var(--t);}
.fi:focus{border-color:var(--p);background:#fff;box-shadow:0 0 0 4px rgba(99,102,241,.1);}
.fi::placeholder{color:var(--hint);}
.eb{background:var(--rp);border:1.5px solid #FCA5A5;border-radius:var(--rs);padding:12px 14px;font-size:13px;color:var(--r);margin-bottom:16px;display:none;line-height:1.6;}
.eb.show{display:block;}
.bp2{width:100%;height:54px;background:linear-gradient(135deg,#6366F1,#8B5CF6);border:none;border-radius:var(--rs);color:#fff;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 6px 20px rgba(99,102,241,.35);margin-top:8px;}
.bp2:disabled{opacity:.6;}
.lhint{font-size:11px;color:var(--hint);text-align:center;margin-top:20px;line-height:1.8;}
/* 앱 */
#app{display:none;flex-direction:column;min-height:100vh;}
#app.show{display:flex;}
.hd{background:linear-gradient(135deg,#6366F1,#8B5CF6);padding-top:env(safe-area-inset-top,0px);position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(99,102,241,.3);}
.hi{display:flex;align-items:center;padding:16px 20px 14px;gap:12px;}
.hico{width:36px;height:36px;background:rgba(255,255,255,.2);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.htx{flex:1;}
.hkg{font-size:16px;font-weight:800;color:#fff;}
.hu{font-size:11px;color:rgba(255,255,255,.75);margin-top:1px;}
.hcl{font-size:14px;font-weight:700;color:rgba(255,255,255,.95);background:rgba(255,255,255,.18);padding:6px 12px;border-radius:20px;flex-shrink:0;}
.ct{flex:1;overflow-y:auto;padding-bottom:calc(80px + env(safe-area-inset-bottom,0px));}
.pc{margin:16px;background:linear-gradient(135deg,#1E293B,#334155);border-radius:var(--ra);padding:24px 20px;color:#fff;position:relative;overflow:hidden;}
.pc::before{content:'🏫';font-size:80px;position:absolute;right:-10px;bottom:-16px;opacity:.1;line-height:1;}
.ptag{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.15);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;margin-bottom:14px;}
.ptag::before{content:'';width:6px;height:6px;background:#4ADE80;border-radius:50%;}
.pnm{font-size:26px;font-weight:900;margin-bottom:4px;}
.pcl{font-size:14px;color:rgba(255,255,255,.7);margin-bottom:16px;}
.pps{display:flex;gap:8px;flex-wrap:wrap;}
.pp{background:rgba(255,255,255,.12);border-radius:20px;padding:5px 14px;font-size:12px;font-weight:600;}
.pp.td{background:rgba(99,102,241,.5);}
.anb{margin:0 16px 16px;background:linear-gradient(135deg,#3B82F6,#1D4ED8);border-radius:var(--ra);padding:16px 18px;color:#fff;display:flex;align-items:center;gap:14px;}
.sec{padding:0 16px 4px;}
.sh{font-size:14px;font-weight:800;color:var(--t);display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.sh::before{content:'';width:4px;height:18px;background:var(--p);border-radius:2px;}
.rc{background:var(--c);border-radius:var(--ra);padding:20px;box-shadow:var(--sh);border:1px solid var(--bdr);margin-bottom:4px;}
.rtr{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:12px;}
.rtm{font-size:40px;font-weight:900;color:var(--p);line-height:1;}
.rb{display:inline-flex;align-items:center;font-size:12px;font-weight:700;padding:5px 12px;border-radius:20px;}
.rb0{background:var(--ap);color:var(--a);}
.rb1{background:var(--bp);color:var(--b);}
.rb2{background:var(--gp);color:var(--g);}
.rb3{background:var(--rp);color:var(--r);}
.rdr{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--sub);padding:10px 0;border-top:1px solid var(--bdr);border-bottom:1px solid var(--bdr);margin-bottom:12px;}
.bca{width:100%;height:42px;background:var(--rp);border:1.5px solid #FCA5A5;border-radius:var(--rs);color:var(--r);font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;}
.nr{text-align:center;padding:32px 0;background:var(--c);border-radius:var(--ra);border:1px solid var(--bdr);}
.ts2{padding:0 16px 16px;}
.tg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;}
.tb{height:52px;background:var(--c);border:2px solid var(--bdr);border-radius:var(--rs);font-size:13px;font-weight:700;color:var(--sub);cursor:pointer;font-family:inherit;}
.tb.sel{background:var(--p);border-color:var(--p);color:#fff;}
.tb.past{opacity:.35;cursor:not-allowed;}
.brv{width:100%;height:56px;background:linear-gradient(135deg,#6366F1,#8B5CF6);border:none;border-radius:var(--ra);color:#fff;font-size:17px;font-weight:800;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 6px 24px rgba(99,102,241,.35);}
.brv:disabled{opacity:.45;cursor:not-allowed;box-shadow:none;}
.tbar{background:#fff;border-top:1px solid var(--bdr);display:flex;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:100;padding-bottom:env(safe-area-inset-bottom,0px);box-shadow:0 -4px 16px rgba(0,0,0,.06);}
.tb2{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 0;cursor:pointer;font-size:10px;font-weight:600;color:var(--hint);border:none;background:none;font-family:inherit;}
.tb2.active{color:var(--p);}
.scr{display:none;}
.scr.active{display:block;}
.hl{padding:16px;display:flex;flex-direction:column;gap:10px;}
.hc{background:var(--c);border-radius:var(--ra);padding:16px 18px;border:1px solid var(--bdr);display:flex;align-items:center;gap:14px;}
.hdv{width:1px;height:40px;background:var(--bdr);flex-shrink:0;}
.hdt{flex-shrink:0;text-align:center;width:48px;}
.hmo{font-size:11px;color:var(--hint);font-weight:600;}
.hdy{font-size:20px;font-weight:900;color:var(--t);line-height:1.1;}
.hif{flex:1;}
.htm2{font-size:20px;font-weight:900;color:var(--p);}
.hm{font-size:11px;color:var(--sub);margin-top:2px;}
.sw{padding:20px 16px;}
.sst{font-size:11px;font-weight:700;color:var(--hint);letter-spacing:1px;text-transform:uppercase;margin:0 4px 8px;}
.sg{background:var(--c);border-radius:var(--ra);overflow:hidden;border:1px solid var(--bdr);margin-bottom:4px;}
.sr{display:flex;align-items:center;gap:14px;padding:14px 16px;border-bottom:1px solid var(--bdr);}
.sr:last-child{border-bottom:none;}
.si{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.sl{font-size:14px;font-weight:600;color:var(--t);}
.sv2{margin-left:auto;font-size:13px;color:var(--sub);}
.blo{width:100%;height:52px;background:var(--rp);border:1.5px solid #FCA5A5;border-radius:var(--ra);color:var(--r);font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:20px;}
</style>
</head>
<body>

<!-- 로딩 (기본 숨김 - display:none) -->
<div id="ld"><div class="ldr"></div><p style="font-size:13px;color:#64748B;font-weight:500">잠시만 기다려주세요...</p></div>
<div id="ts"></div>

<!-- 로그인 -->
<div id="ls">
  <div class="lc">
    <div class="lb"><div class="lg">🏫</div><div class="lt">하원알림</div><div class="ls2">학부모 하원 예약 서비스</div></div>
    <div class="eb" id="eb"></div>
    <div class="fg"><label class="fl">전화번호</label><input class="fi" id="fp" type="tel" placeholder="010-0000-0000" autocomplete="tel" inputmode="tel"></div>
    <div class="fg"><label class="fl">자녀 이름 <span style="font-weight:400;color:var(--hint)">(선택)</span></label><input class="fi" id="fn" type="text" placeholder="자녀 이름 입력"></div>
    <button class="bp2" id="lbtn" onclick="doLogin()"><span>🔐</span><span>로그인</span></button>
    <p class="lhint">유치원에 등록된 전화번호로 로그인하세요<br>문의: 담당 선생님께 연락해 주세요</p>
  </div>
</div>

<!-- 앱 -->
<div id="app">
  <div class="hd"><div class="hi">
    <div class="hico">🏫</div>
    <div class="htx"><div class="hkg" id="hkg">하원알림</div><div class="hu" id="hu">학부모 앱</div></div>
    <div class="hcl" id="hcl">--:--</div>
  </div></div>
  <div class="ct">
    <div class="scr active" id="s-home">
      <div class="pc">
        <div class="ptag">재원생</div>
        <div class="pnm" id="pnm">학생 이름</div>
        <div class="pcl" id="pcl">반 정보</div>
        <div class="pps"><div class="pp" id="pgu">보호자</div><div class="pp td" id="ptd">오늘 예약 없음</div></div>
      </div>
      <div class="anb" id="anb" style="display:none">
        <span style="font-size:30px;flex-shrink:0">📢</span>
        <div><div style="font-size:14px;font-weight:800">하원 방송이 나갔습니다!</div><div style="font-size:12px;opacity:.85;margin-top:3px" id="ans">잠시 후 하원해 주세요</div></div>
      </div>
      <div class="sec"><div class="sh">오늘 하원 예약</div><div id="tres"></div></div>
      <div class="ts2" id="tss">
        <div class="sh" style="margin-bottom:12px">하원 시간 선택</div>
        <div class="tg" id="tgd"></div>
        <button class="brv" id="rbtn" disabled onclick="mkRes()"><span>📅</span><span>하원 예약하기</span></button>
      </div>
    </div>
    <div class="scr" id="s-history"><div class="hl" id="hlist"></div></div>
    <div class="scr" id="s-settings">
      <div class="sw">
        <div class="sst">내 정보</div>
        <div class="sg">
          <div class="sr"><div class="si" style="background:#EEF2FF">👶</div><div class="sl">자녀</div><div class="sv2" id="svst"></div></div>
          <div class="sr"><div class="si" style="background:#F0FDF4">🏫</div><div class="sl">유치원</div><div class="sv2" id="svkg"></div></div>
          <div class="sr"><div class="si" style="background:#FFF7ED">👤</div><div class="sl">보호자</div><div class="sv2" id="svnm"></div></div>
          <div class="sr"><div class="si" style="background:#FFFBEB">📱</div><div class="sl">전화번호</div><div class="sv2" id="svph"></div></div>
        </div>
        <div class="sst" style="margin-top:20px">앱 정보</div>
        <div class="sg">
          <div class="sr"><div class="si" style="background:#F5F3FF">ℹ️</div><div class="sl">버전</div><div class="sv2">1.0.0</div></div>
          <div class="sr"><div class="si" style="background:#ECFDF5">📡</div><div class="sl">서버 상태</div><div class="sv2" id="svsv">확인 중...</div></div>
        </div>
        <button class="blo" onclick="doLogout()">🚪 로그아웃</button>
      </div>
    </div>
  </div>
  <div class="tbar">
    <button class="tb2 active" id="t-home" onclick="swTab('home',this)"><span style="font-size:22px">🏠</span><span>홈</span></button>
    <button class="tb2" id="t-history" onclick="swTab('history',this)"><span style="font-size:22px">📋</span><span>내역</span></button>
    <button class="tb2" id="t-settings" onclick="swTab('settings',this)"><span style="font-size:22px">⚙️</span><span>설정</span></button>
  </div>
</div>

<script>
var SV='https://hawoenim-production.up.railway.app';
var tok=null,fam=null,sel=null;
try{tok=localStorage.getItem('fw_t');}catch(e){}
try{fam=JSON.parse(localStorage.getItem('fw_f')||'null');}catch(e){}

function ldS(){document.getElementById('ld').style.display='flex';}
function ldH(){document.getElementById('ld').style.display='none';}

function tick(){var n=new Date(),e=document.getElementById('hcl');if(e)e.textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');}
setInterval(tick,1000);tick();

function toast(m,d){var e=document.getElementById('ts');if(!e)return;e.textContent=m;e.classList.add('show');clearTimeout(e._t);e._t=setTimeout(function(){e.classList.remove('show');},(d||2800));}

async function api(mt,path,body){
  var o={method:mt,headers:{'Content-Type':'application/json'}};
  if(tok)o.headers['Authorization']='Bearer '+tok;
  if(body)o.body=JSON.stringify(body);
  try{var r=await fetch(SV+path,o);var d=await r.json().catch(function(){return{};});if(r.status===401){doLogout();return null;}return d;}
  catch(e){return{success:false,message:'서버 연결 오류'};}
}

document.getElementById('fp').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('fn').focus();});
document.getElementById('fn').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});

async function doLogin(){
  var ph=document.getElementById('fp').value.trim().split('-').join('').split(' ').join(''),nm=document.getElementById('fn').value.trim();
  var eb=document.getElementById('eb'),btn=document.getElementById('lbtn');
  eb.classList.remove('show');
  if(!ph){eb.textContent='전화번호를 입력해주세요.';eb.classList.add('show');return;}
  btn.disabled=true;btn.innerHTML='<div class="ldr" style="width:20px;height:20px;border-width:3px;margin:0 auto"></div>';
  ldS();
  var d=await api('POST','/api/family/login',{phone:ph,student_name:nm||undefined});
  ldH();btn.disabled=false;btn.innerHTML='<span>🔐</span><span>로그인</span>';
  if(!d||!d.success){eb.textContent=d&&d.message?d.message:'로그인 실패. 유치원에 문의해주세요.';eb.classList.add('show');return;}
  tok=d.token;fam=d.family;
  try{localStorage.setItem('fw_t',tok);localStorage.setItem('fw_f',JSON.stringify(fam));}catch(e){}
  startApp();
}

function startApp(){
  document.getElementById('ls').style.display='none';
  document.getElementById('app').classList.add('show');
  applyInfo();loadHome();
  api('GET','/api/health').then(function(d){var e=document.getElementById('svsv');if(e)e.textContent=d&&d.success?'🟢 정상':'🔴 오류';});
}

function applyInfo(){
  if(!fam)return;
  var kg=fam.kindergarten_name||'하원알림',s=function(v){return v||'';};
  document.getElementById('hkg').textContent=kg;
  document.getElementById('hu').textContent=s(fam.name)+' 보호자 · '+s(fam.student_name)+' 학생';
  document.getElementById('pnm').textContent=s(fam.student_name);
  document.getElementById('pcl').textContent='🏫 '+s(fam.classroom_name);
  document.getElementById('pgu').textContent=s(fam.relation||'보호자')+' '+s(fam.name);
  document.getElementById('svst').textContent=s(fam.student_name);
  document.getElementById('svkg').textContent=kg;
  document.getElementById('svnm').textContent=s(fam.name);
  document.getElementById('svph').textContent=s(fam.phone);
}

async function loadHome(){
  var d=await api('GET','/api/family/me');
  if(!d||!d.success)return;
  try{fam=Object.assign({},fam,d.family);localStorage.setItem('fw_f',JSON.stringify(fam));}catch(e){}
  applyInfo();renderRes(d.todayReservation);buildGrid(d.todayReservation);
}

function renderRes(r){
  var el=document.getElementById('tres'),ab=document.getElementById('anb'),td=document.getElementById('ptd');
  var sl={pending:'대기 중',announced:'방송 완료',done:'하원 완료',cancelled:'취소됨'};
  var sc={pending:'rb0',announced:'rb1',done:'rb2',cancelled:'rb3'};
  if(!r||r.status==='cancelled'){
    td.textContent='오늘 예약 없음';
    el.innerHTML='<div class="nr"><div style="font-size:48px;margin-bottom:10px">📅</div><div style="font-size:15px;font-weight:700;color:var(--sub)">오늘 예약이 없습니다</div><div style="font-size:12px;color:var(--hint);margin-top:4px">아래에서 하원 시간을 선택해주세요</div></div>';
    ab.style.display='none';return;
  }
  td.textContent=r.pickup_time+' 예약';
  if(r.status==='announced'){ab.style.display='flex';document.getElementById('ans').textContent=r.pickup_time+' 하원 · 잠시 후 나와주세요!';}
  else ab.style.display='none';
  var cb=r.status==='pending'?'<button class="bca" onclick="cancelR('+r.id+')">예약 취소하기</button>':'';
  el.innerHTML='<div class="rc"><div class="rtr"><div><div class="rtm">'+r.pickup_time+'</div><div style="font-size:12px;color:var(--sub);margin-top:4px">하원 예정 시간</div></div><span class="rb '+(sc[r.status]||'rb0')+'">'+(sl[r.status]||r.status)+'</span></div><div class="rdr"><span>📅</span><span>'+r.reserve_date+' (오늘)</span></div>'+cb+'</div>';
}

function buildGrid(times, past) {
  var el = document.getElementById('tgd');
  if (!el) return;
  el.innerHTML = times.map(function(t) {
    var cls = 'tb' + (past ? ' past' : '');
    var dis = past ? ' disabled' : '';
    return '<button class="' + cls + '" data-time="' + t + '"' + dis + '>' + t + '</button>';
  }).join('');
  Array.from(el.querySelectorAll('button:not([disabled])')).forEach(function(btn) {
    btn.addEventListener('click', function() { selT(this.dataset.time, this); });
  });
}

function selT(t,btn){document.querySelectorAll('.tb').forEach(function(b){b.classList.remove('sel');});btn.classList.add('sel');sel=t;document.getElementById('rbtn').disabled=false;}

async function mkRes(){
  if(!sel)return;ldS();
  var d=await api('POST','/api/family/reservations',{pickup_time:sel});ldH();
  if(d&&d.success){toast('✅ '+sel+' 하원 예약 완료!');sel=null;loadHome();}
  else toast('❌ '+(d&&d.message?d.message:'예약 실패'));
}

async function cancelR(id){
  if(!confirm('예약을 취소하시겠습니까?'))return;ldS();
  var d=await api('PUT','/api/family/reservations/'+id+'/cancel');ldH();
  if(d&&d.success){toast('예약이 취소됐습니다');loadHome();}
  else toast('❌ '+(d&&d.message?d.message:'취소 실패'));
}

async function loadHistory(){
  var el=document.getElementById('hlist');
  el.innerHTML='<div style="text-align:center;padding:40px;color:var(--hint)">불러오는 중...</div>';
  var d=await api('GET','/api/family/reservations?limit=30');
  if(!d||!d.data||!d.data.length){el.innerHTML='<div class="nr" style="margin:0"><div style="font-size:48px;margin-bottom:10px">📋</div><div style="font-size:15px;font-weight:700;color:var(--sub)">예약 내역이 없습니다</div></div>';return;}
  var sl={pending:'대기중',announced:'방송완료',done:'완료',cancelled:'취소'};
  var sc={pending:'rb0',announced:'rb1',done:'rb2',cancelled:'rb3'};
  el.innerHTML=d.data.map(function(r){
    var dt=new Date(r.reserve_date),mn=dt.getMonth()+1,dy=dt.getDate();
    return '<div class="hc"><div class="hdt"><div class="hmo">'+mn+'월</div><div class="hdy">'+dy+'</div></div><div class="hdv"></div><div class="hif"><div class="htm2">'+r.pickup_time+'</div><div class="hm">'+r.reserve_date+' · <span class="rb '+(sc[r.status]||'rb0')+'" style="font-size:10px;padding:2px 8px">'+(sl[r.status]||r.status)+'</span></div></div></div>';
  }).join('');
}

function swTab(nm,el){
  document.querySelectorAll('.scr').forEach(function(s){s.classList.remove('active');});
  document.querySelectorAll('.tb2').forEach(function(t){t.classList.remove('active');});
  document.getElementById('s-'+nm).classList.add('active');el.classList.add('active');
  if(nm==='history')loadHistory();
  if(nm==='home')loadHome();
}

function doLogout(){
  try{localStorage.removeItem('fw_t');localStorage.removeItem('fw_f');}catch(e){}
  tok=null;fam=null;
  document.getElementById('app').classList.remove('show');
  document.getElementById('ls').style.display='';
  document.getElementById('fp').value='';document.getElementById('fn').value='';
}

// 자동 로그인 (로딩 스피너 없이 바로 실행)
if(tok&&fam){
  // 토큰 유효성 서버 검증
  fetch(SV+'/api/family/me',{headers:{'Authorization':'Bearer '+tok}})
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.success){ startApp(); }
      else{ tok=null; fam=null; try{localStorage.removeItem('fw_t');localStorage.removeItem('fw_f');}catch(e){} }
    })
    .catch(function(){ /* 네트워크 오류 시 로그인 화면 유지 */ });
}
</script>
